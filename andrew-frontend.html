<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FEATHERLESS_API_URL = "https://api.featherless.run/v1/chat/completions";
    const FEATHERLESS_API_KEY = "rc_8931c724abf2632626dea5b3b612ee5a836dc92b22a5e54a315281ce694885af";
    const FEATHERLESS_MODEL = "meta-llama/llama-3-8b-instruct";

    const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
    const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

    const safeDateString = (d) => {
      const date = new Date(d);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    };

    const parseTimeToMinutes = (time) => {
      if (!time) return 0;
      const t = time.trim().toUpperCase();
      const match12 = t.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/);
      if (match12) {
        let h = parseInt(match12[1], 10);
        const m = parseInt(match12[2], 10);
        const ap = match12[3];
        if (ap === 'PM' && h !== 12) h += 12;
        if (ap === 'AM' && h === 12) h = 0;
        return h * 60 + m;
      }
      const match24 = t.match(/^(\d{1,2}):(\d{2})$/);
      if (match24) return parseInt(match24[1], 10) * 60 + parseInt(match24[2], 10);
      return 0;
    };

    const Icons = {
      Calendar: () => (<svg className="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>),
      Troubleshoot: () => (<svg className="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>),
      Org: () => (<svg className="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>),
      Feedback: () => (<svg className="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" /></svg>),
      Dots: () => (<svg className="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" /></svg>),
      Plus: () => (<svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>),
      Close: () => (<svg className="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>),
      Warning: () => (<svg className="w-5 h-5 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>)
    };

    function App() {
      const [themeMode, setThemeMode] = useState('dark');
      const [isCompact, setIsCompact] = useState(false);
      const [currentDate, setCurrentDate] = useState(new Date());
      const [activeTab, setActiveTab] = useState('calendar');
      const [savedBackgrounds] = useState([]);
      const [activeBackgroundIndex] = useState(null);
      const [isCustomizingBg] = useState(false);
      const [brushColor] = useState('#3b82f6');
      const [brushSize] = useState(6);
      const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
      const [isLabelsModalOpen, setIsLabelsModalOpen] = useState(false);
      const [events, setEvents] = useState([
        {
          id: 'demo-prefill-joe',
          title: 'Lunch',
          description: 'eat lunch at the cafe with joe mama at tgi firdays',
          date: safeDateString(new Date()),
          time: '12:00 PM',
          duration: 60,
          label: 'event',
          importance: 'high',
          details: 'Troubleshoot Demo Event',
          syncPlatform: 'None',
          needsTroubleshoot: true,
          troubleshootQuestion: "Did you mean at the Cafe or at TGI Fridays?",
          troubleshootOptions: ["Cafe", "TGI Fridays"],
          resolvedOption: null
        }
      ]);
      const [toastMessage, setToastMessage] = useState(null);
      const [is24HourClock, setIs24HourClock] = useState(false);
      const [labelsList, setLabelsList] = useState([
        { name: 'event', color: 'bg-emerald-500/10 text-emerald-700 dark:text-emerald-300 border-emerald-500/20' },
        { name: 'due date', color: 'bg-rose-500/10 text-rose-700 dark:text-rose-300 border-rose-500/20' },
        { name: 'recurring event', color: 'bg-amber-500/10 text-amber-700 dark:text-amber-300 border-amber-500/20' },
        { name: 'custom task', color: 'bg-blue-500/10 text-blue-700 dark:text-blue-300 border-blue-500/20' }
      ]);
      const [newLabelName, setNewLabelName] = useState('');
      const [troubleQueue, setTroubleQueue] = useState([
        { id: 't1', rawText: 'lunch with dev group maybe around 1 or 2 next monday', suspectedType: 'event', possibleDates: ['Next Monday'], details: 'Ambiguity: "around 1 or 2" is multiple hours. "next monday" is unspecified date.' },
        { id: 't2', rawText: 'finish fixing the bug before midnight tomorrow', suspectedType: 'due date', possibleDates: ['Tomorrow Midnight'], details: 'Ambiguity: Needs specific project assignment or label confirmation.' }
      ]);
      const [calendarView, setCalendarView] = useState('month');
      const [selectedDayString, setSelectedDayString] = useState(safeDateString(new Date()));
      const [isTodoMode] = useState(false);
      const [todoSortMode] = useState('time');
      const [isRightPanelOpen, setIsRightPanelOpen] = useState(false);
      const [rightPanelMode, setRightPanelMode] = useState('view');
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [editTitle, setEditTitle] = useState('');
      const [editDescription, setEditDescription] = useState('');
      const [editDate, setEditDate] = useState('');
      const [editTime, setEditTime] = useState('12:00 PM');
      const [editDuration, setEditDuration] = useState(60);
      const [editLabel, setEditLabel] = useState('event');
      const [editSync, setEditSync] = useState('None');
      const [editImportance, setEditImportance] = useState('medium');
      const [editDetails, setEditDetails] = useState('');
      const [editNeedsTroubleshoot, setEditNeedsTroubleshoot] = useState(false);
      const [editTroubleshootQuestion, setEditTroubleshootQuestion] = useState('');
      const [editTroubleshootOptions, setEditTroubleshootOptions] = useState([]);
      const [editResolvedOption, setEditResolvedOption] = useState(null);
      const [customOverrideText, setCustomOverrideText] = useState('');
      const lastKeyRef = useRef(null);
      const [liveMinutes, setLiveMinutes] = useState(0);
      const dayTimelineScrollRef = useRef(null);
      const [parentalControlsEnabled, setParentalControlsEnabled] = useState(true);
      const [feedbackCategory, setFeedbackCategory] = useState('Recommendation');
      const [feedbackText, setFeedbackText] = useState('');
      const [feedbacks, setFeedbacks] = useState([]);

      const isDark = themeMode === 'dark';
      const triggerToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000); };

      const orgUsers = [
        { id: 1, name: 'Alex Johnson', role: 'Product Manager', availableSlots: ['09:00 AM - 10:00 AM', '02:00 PM - 03:00 PM'] },
        { id: 2, name: 'Maria Chen', role: 'Designer', availableSlots: ['11:00 AM - 12:00 PM', '03:00 PM - 04:00 PM'] },
        { id: 3, name: 'Sam Patel', role: 'Engineer', availableSlots: ['10:30 AM - 11:30 AM', '04:00 PM - 05:00 PM'] }
      ];

      const getFriendlyDateHeader = () => {
        if (calendarView === 'year') return `${currentDate.getFullYear()}`;
        if (calendarView === 'month') return currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        if (calendarView === 'day') return new Date(selectedDayString + 'T00:00:00').toLocaleDateString('default', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        const d = new Date(selectedDayString + 'T00:00:00');
        const start = new Date(d);
        start.setDate(d.getDate() - d.getDay());
        const end = new Date(start);
        end.setDate(start.getDate() + 6);
        return `${start.toLocaleDateString('default', { month: 'short', day: 'numeric' })} - ${end.toLocaleDateString('default', { month: 'short', day: 'numeric', year: 'numeric' })}`;
      };

      const handleCreateNewClick = () => {
        setSelectedEvent(null);
        setEditTitle('');
        setEditDescription('');
        setEditDate(selectedDayString);
        setEditTime('12:00 PM');
        setEditDuration(60);
        setEditLabel('event');
        setEditSync('None');
        setEditImportance('medium');
        setEditDetails('');
        setEditNeedsTroubleshoot(false);
        setEditTroubleshootQuestion('');
        setEditTroubleshootOptions([]);
        setEditResolvedOption(null);
        setCustomOverrideText('');
        setRightPanelMode('create');
        setIsRightPanelOpen(true);
      };

      const handleDayCellClick = (dayStr) => {
        setSelectedDayString(dayStr);
        setCalendarView('day');
      };

      const handleEventClick = (e, event) => {
        e.stopPropagation();
        setSelectedEvent(event);
        setEditTitle(event.title || '');
        setEditDescription(event.description || '');
        setEditDate(event.date || selectedDayString);
        setEditTime(event.time || '12:00 PM');
        setEditDuration(event.duration || 60);
        setEditLabel(event.label || 'event');
        setEditSync(event.syncPlatform || 'None');
        setEditImportance(event.importance || 'medium');
        setEditDetails(event.details || '');
        setEditNeedsTroubleshoot(!!event.needsTroubleshoot);
        setEditTroubleshootQuestion(event.troubleshootQuestion || '');
        setEditTroubleshootOptions(event.troubleshootOptions || []);
        setEditResolvedOption(event.resolvedOption || null);
        setCustomOverrideText('');
        setRightPanelMode('view');
        setIsRightPanelOpen(true);
      };

      const handleDeleteEvent = (eventId) => {
        setEvents(events.filter(ev => ev.id !== eventId));
        setIsRightPanelOpen(false);
      };

      const resolveTrouble = (item, label, date) => {
        const newEvent = {
          id: 'e_' + Date.now(),
          title: item.rawText.split(' ')[0] || 'Resolved Item',
          description: item.rawText,
          date: safeDateString(new Date()),
          time: '12:00 PM',
          duration: 60,
          label,
          importance: 'medium',
          details: date ? `Resolved: ${date}` : '',
          syncPlatform: 'None',
          needsTroubleshoot: false,
          troubleshootQuestion: '',
          troubleshootOptions: [],
          resolvedOption: date || null
        };
        setEvents([...events, newEvent]);
        setTroubleQueue(troubleQueue.filter(q => q.id !== item.id));
        triggerToast('Trouble resolved and event added.');
      };

      const deleteLabel = (name) => {
        setLabelsList(labelsList.filter(l => l.name !== name));
      };

      const addNewLabel = () => {
        const n = newLabelName.trim();
        if (!n) return;
        if (labelsList.some(l => l.name.toLowerCase() === n.toLowerCase())) return;
        setLabelsList([...labelsList, { name: n, color: 'bg-slate-500/10 text-slate-700 dark:text-slate-300 border-slate-500/20' }]);
        setNewLabelName('');
      };

      useEffect(() => {
        const updateTime = () => setLiveMinutes(new Date().getHours() * 60 + new Date().getMinutes());
        updateTime();
        const interval = setInterval(updateTime, 1000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if ((calendarView === 'day' || calendarView === 'week') && dayTimelineScrollRef.current) {
          dayTimelineScrollRef.current.scrollTop = 420;
        }
      }, [calendarView]);

      useEffect(() => {
        const handleDevTools = (e) => {
          if (lastKeyRef.current === '`' && e.key.toLowerCase() === 'q') {
            if (isRightPanelOpen && (rightPanelMode === 'create' || rightPanelMode === 'edit')) {
              setEditNeedsTroubleshoot(true);
              setEditTroubleshootQuestion("Did you mean at Microsoft HQ or at Amazon HQ?");
              setEditTroubleshootOptions(["Microsoft HQ", "Amazon HQ"]);
              setEditResolvedOption(null);
              triggerToast("Devtools: Injected mockup troubleshoot sequence!");
            } else {
              triggerToast("Please open the Event Creation modal first before testing questions!");
            }
          }
          lastKeyRef.current = e.key;
        };
        window.addEventListener('keydown', handleDevTools);
        return () => window.removeEventListener('keydown', handleDevTools);
      }, [isRightPanelOpen, rightPanelMode]);

      useEffect(() => {
        const root = window.document.documentElement;
        if (isDark) root.classList.add('dark'); else root.classList.remove('dark');
      }, [isDark]);

      const simulateLocalAI = (text) => {
        const lowercase = text.toLowerCase();
        let label = 'event';
        if (lowercase.includes('due') || lowercase.includes('deadline') || lowercase.includes('submit')) label = 'due date';
        else if (lowercase.includes('every') || lowercase.includes('weekly') || lowercase.includes('recurring')) label = 'recurring event';
        let time = '12:00 PM';
        const timeMatch = text.match(/(\d+):?(\d+)?\s*(am|pm)/i);
        if (timeMatch) time = timeMatch[0].toUpperCase();
        let targetDate = safeDateString(new Date());
        if (lowercase.includes('tomorrow')) targetDate = safeDateString(new Date(Date.now() + 86400000));
        let importance = 'medium';
        if (lowercase.includes('important') || lowercase.includes('urgent') || lowercase.includes('asap')) importance = 'high';
        const isTroubleshootDemo = lowercase.includes("cafe") && lowercase.includes("mama");
        return {
          title: isTroubleshootDemo ? 'Lunch' : (text.split('at')[0].trim().substring(0, 40) || 'Synthesized Task'),
          date: targetDate,
          time,
          duration: 60,
          label,
          importance,
          needsTroubleshoot: isTroubleshootDemo,
          troubleshootQuestion: isTroubleshootDemo ? "Did you mean at the Cafe or at TGI Fridays?" : "",
          troubleshootOptions: isTroubleshootDemo ? ["Cafe", "TGI Fridays"] : []
        };
      };

      const handleSaveEventAndAnalyze = async () => {
        const textContext = editDescription.trim();
        if (!textContext) { triggerToast("Please write details into the Notecard"); return; }
        const localParsed = simulateLocalAI(textContext);
        try {
          const response = await fetch(FEATHERLESS_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${FEATHERLESS_API_KEY}` },
            body: JSON.stringify({
              model: FEATHERLESS_MODEL,
              messages: [
                { role: "system", content: "You are a professional calendar scheduling assistant. Parse the calendar entry. Respond ONLY in JSON matching this exact layout: {\"title\": \"string\", \"time\": \"HH:MM AM/PM\", \"duration\": 60, \"label\": \"event\", \"importance\": \"medium\"}." },
                { role: "user", content: `Analyze this note text: "${textContext}"` }
              ]
            })
          });
          if (!response.ok) throw new Error("API Limit or Request Error");
          const data = await response.json();
          const rawResult = data.choices?.[0]?.message?.content || '';
          const jsonText = rawResult.includes('{') ? rawResult.slice(rawResult.indexOf('{'), rawResult.lastIndexOf('}') + 1) : '{}';
          const parsed = JSON.parse(jsonText);
          setEditTitle(parsed.title || localParsed.title);
          setEditTime(parsed.time || localParsed.time);
          setEditDuration(parsed.duration || 60);
          setEditLabel(parsed.label || 'event');
          setEditImportance(parsed.importance || 'medium');
          setEditSync('None');
          setEditDetails("Analyzed in real-time by NEXTCalendar Llama AI.");
          if (textContext.toLowerCase().includes("cafe") && textContext.toLowerCase().includes("mama")) {
            setEditNeedsTroubleshoot(true);
            setEditTroubleshootQuestion("Did you mean at the Cafe or at TGI Fridays?");
            setEditTroubleshootOptions(["Cafe", "TGI Fridays"]);
            setEditResolvedOption(null);
          } else {
            setEditNeedsTroubleshoot(false);
          }
          triggerToast("AI analysis complete!");
        } catch (err) {
          setEditTitle(localParsed.title);
          setEditTime(localParsed.time);
          setEditDuration(localParsed.duration);
          setEditLabel(localParsed.label);
          setEditImportance(localParsed.importance);
          setEditSync('None');
          setEditDetails("Parsed locally via fallback engine.");
          if (localParsed.needsTroubleshoot) {
            setEditNeedsTroubleshoot(true);
            setEditTroubleshootQuestion(localParsed.troubleshootQuestion);
            setEditTroubleshootOptions(localParsed.troubleshootOptions);
            setEditResolvedOption(null);
          } else {
            setEditNeedsTroubleshoot(false);
          }
          triggerToast("AI offline. Processed via local parser!");
        }
      };

      const handleMonthCellBackgroundClick = (dayStr) => {
        setSelectedDayString(dayStr);
        setSelectedEvent(null);
        setEditTitle('');
        setEditDescription('');
        setEditDate(dayStr);
        setEditTime('12:00 PM');
        setEditDuration(60);
        setEditLabel('event');
        setEditDetails('');
        setEditSync('None');
        setEditImportance('medium');
        setEditNeedsTroubleshoot(false);
        setEditTroubleshootQuestion("");
        setEditTroubleshootOptions([]);
        setEditResolvedOption(null);
        setRightPanelMode('create');
        setIsRightPanelOpen(true);
      };

      const handleDayTimelineGridClick = (e, targetDayStr) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const clickY = e.clientY - rect.top;
        let hours = Math.floor(clickY / 60);
        let mins = Math.round((clickY % 60) / 5) * 5;
        if (mins === 60) { hours += 1; mins = 0; }
        if (hours >= 24) hours = 23;
        const ampm = hours >= 12 ? 'PM' : 'AM';
        const displayHours = hours % 12 === 0 ? 12 : hours % 12;
        const timeStr = `${String(displayHours).padStart(2, '0')}:${String(mins).padStart(2, '0')} ${ampm}`;
        setEditDate(targetDayStr || selectedDayString);
        setEditTime(timeStr);
        setEditDuration(60);
        setEditTitle('');
        setEditDescription('');
        setEditLabel('event');
        setEditDetails('');
        setEditSync('None');
        setEditImportance('medium');
        setEditNeedsTroubleshoot(false);
        setEditResolvedOption(null);
        setRightPanelMode('create');
        setIsRightPanelOpen(true);
      };

      const getActiveWeekDays = () => {
        const selected = new Date(selectedDayString + 'T00:00:00');
        const sundayOffset = selected.getDate() - selected.getDay();
        const days = [];
        for (let i = 0; i < 7; i++) days.push(new Date(selected.getFullYear(), selected.getMonth(), sundayOffset + i));
        return days;
      };

      const renderMiniMonth = (monthIndex) => {
        const targetYear = currentDate.getFullYear();
        const firstDay = new Date(targetYear, monthIndex, 1).getDay();
        const totalDays = new Date(targetYear, monthIndex + 1, 0).getDate();
        const miniDays = [];
        for (let i = 0; i < firstDay; i++) miniDays.push(null);
        for (let i = 1; i <= totalDays; i++) miniDays.push(i);
        const targetMonthName = new Date(targetYear, monthIndex, 1).toLocaleString('default', { month: 'short' });
        return (
          <div key={monthIndex} onClick={() => { setCurrentDate(new Date(targetYear, monthIndex, 1)); setCalendarView('month'); }} className={`border p-4 rounded-2xl cursor-pointer transition-all duration-300 shadow-sm flex flex-col gap-2 hover:scale-[1.03] transform ${isDark ? 'bg-slate-900 border-slate-800 hover:border-blue-500' : 'bg-white border-slate-200 hover:border-blue-500'} ${new Date().getMonth() === monthIndex && new Date().getFullYear() === targetYear ? 'ring-2 ring-blue-500/50' : ''}`}>
            <h4 className="text-xs font-black text-blue-600 dark:text-blue-400 capitalize pb-1 border-b border-slate-100 dark:border-slate-800">{targetMonthName}</h4>
            <div className="grid grid-cols-7 gap-0.5 text-[8px] text-center font-black text-slate-500">{['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => <div key={i}>{d}</div>)}</div>
            <div className="grid grid-cols-7 gap-0.5 text-[8px] text-center">
              {miniDays.map((d, i) => <div key={i} className={`py-0.5 rounded-sm font-semibold ${d ? (d === new Date().getDate() && monthIndex === new Date().getMonth() && targetYear === new Date().getFullYear() ? 'bg-blue-600 text-white font-bold' : (isDark ? 'text-slate-300' : 'text-slate-700')) : 'text-transparent'}`}>{d || ''}</div>)}
            </div>
          </div>
        );
      };

      const daysInMonthCount = getDaysInMonth(currentDate);
      const firstDayOffsetIndex = getFirstDayOfMonth(currentDate);
      const daysArray = [];
      for (let i = 0; i < firstDayOffsetIndex; i++) daysArray.push(null);
      for (let i = 1; i <= daysInMonthCount; i++) daysArray.push(i);
      const activeDayEvents = events.filter(e => e.date === selectedDayString);
      const standardHours = Array.from({ length: 24 }, (_, i) => ({
        label: is24HourClock ? `${String(i).padStart(2, '0')}:00` : `${String(i % 12 === 0 ? 12 : i % 12).padStart(2, '0')}:00 ${i >= 12 ? 'PM' : 'AM'}`,
        minuteOffset: i * 60
      }));

      return (
        <div className={`min-h-screen h-screen flex font-sans select-none overflow-hidden relative ${isDark ? 'dark bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>

              <div onClick={(e) => e.stopPropagation()} className={`border rounded-3xl w-full max-w-md p-6 shadow-2xl flex flex-col justify-between max-h-[92vh] overflow-y-auto ${isDark ? 'bg-slate-900 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-900'}`}>
                <div>
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-sm font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400 select-none">Configurations</h3>
                    <button onClick={() => setIsSettingsModalOpen(false)} className="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><Icons.Close /></button>
                  </div>
                  <div className="flex flex-col gap-5">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs uppercase font-bold tracking-widest text-slate-500">Interface Theme</label>
                      <select value={themeMode} onChange={(e) => setThemeMode(e.target.value)} className={`w-full border rounded-xl p-2.5 text-xs outline-none ${isDark ? 'bg-slate-950 border-slate-800 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'}`}>
                        <option value="light">Light theme</option>
                        <option value="dark">Dark theme</option>
                      </select>
                    </div>
                    <div className="flex flex-col gap-1.5 pt-2 border-t border-slate-100 dark:border-slate-800/60">
                      <label className="text-xs uppercase font-bold tracking-widest text-slate-500">Time Format</label>
                      <div className="flex gap-2">
                        <button onClick={() => setIs24HourClock(false)} className={`flex-1 py-2 rounded-xl text-xs font-bold transition border ${!is24HourClock ? 'bg-blue-600 text-white border-blue-600' : (isDark ? 'bg-slate-950 border-slate-800 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-700')}`}>12-Hour Clock</button>
                        <button onClick={() => setIs24HourClock(true)} className={`flex-1 py-2 rounded-xl text-xs font-bold transition border ${is24HourClock ? 'bg-blue-600 text-white border-blue-600' : (isDark ? 'bg-slate-950 border-slate-800 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-700')}`}>24-Hour Clock</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {isRightPanelOpen && (
            <div onClick={() => setIsRightPanelOpen(false)} className="fixed inset-0 bg-slate-950/65 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div onClick={(e) => e.stopPropagation()} className={`flex flex-col justify-between max-h-[92vh] border shadow-2xl overflow-y-auto ${isDark ? 'bg-slate-900 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-900'} ${isCompact ? 'w-full md:w-[600px] h-screen fixed top-0 right-0 z-50 p-6 rounded-l-3xl border-l' : 'w-full max-w-4xl p-6 rounded-3xl'}`}>
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xs font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400 select-none">{rightPanelMode === 'create' ? 'Create Event with AI Notecard' : rightPanelMode === 'edit' ? 'Edit Event Details' : 'Event Summary'}</h3>
                  <button onClick={() => setIsRightPanelOpen(false)} className="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><Icons.Close /></button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start flex-1 overflow-y-auto pb-4">
                  <div className="flex flex-col gap-4">
                    <div>
                      <label className="text-[10px] uppercase font-bold tracking-widest text-slate-500 block mb-1">Headline Title (Optional)</label>
                      <input type="text" value={editTitle} onChange={(e) => setEditTitle(e.target.value)} placeholder="Auto-generated if empty..." className={`w-full border rounded-xl p-3 text-xs outline-none ${isDark ? 'bg-slate-950 border-slate-800 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'}`} />
                    </div>
                    <div>
                      <label className="text-[10px] uppercase font-bold tracking-widest text-slate-500 block mb-1">Big Notecard notes (AI Parser Context)</label>
                      <textarea rows={8} value={editDescription} onChange={(e) => setEditDescription(e.target.value)} placeholder="Write detailed event notes here..." className={`w-full border rounded-xl p-3 text-xs outline-none resize-none ${isDark ? 'bg-slate-950 border-slate-800 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'}`} />
                    </div>
                    <div className="pt-2">
                      <button onClick={handleSaveEventAndAnalyze} className="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-500/15">Analyze</button>
                    </div>
                  </div>

                  <div className={`border p-5 rounded-2xl flex flex-col gap-4 h-full ${isDark ? 'bg-slate-950/40 border-slate-800/80' : 'bg-slate-50 border-slate-200/80'}`}>
                    <div>
                      <span className="text-[10px] uppercase font-bold tracking-widest text-blue-500 dark:text-blue-400 block mb-1">NEXTCalendar Agent interpretation</span>
                      <div className="space-y-1">
                        <p className="text-[11px] font-bold text-slate-500 dark:text-slate-400">Interpreted Title:</p>
                        <h4 className="text-sm font-black text-slate-900 dark:text-white leading-tight">{editTitle.trim() || "Awaiting Analysis..."}</h4>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3 text-xs border-t border-slate-100 dark:border-slate-800/60 pt-3">
                      <div><span className="text-[10px] uppercase font-bold tracking-widest text-slate-500 block mb-0.5">Time</span><p className="font-bold">{editTime}</p></div>
                      <div><span className="text-[10px] uppercase font-bold tracking-widest text-slate-500 block mb-0.5">Duration</span><p className="font-bold">{editDuration} Mins</p></div>
                    </div>

                    {editNeedsTroubleshoot && (
                      <div className={`border p-4 rounded-xl flex flex-col gap-2.5 ${isDark ? 'bg-slate-900/60 border-slate-800/60' : 'bg-red-500/5 border-red-500/10'}`}>
                        <div className="flex items-center gap-1.5">
                          <Icons.Warning />
                          <span className="text-xs font-black text-red-500 uppercase tracking-wider">Quick question</span>
                        </div>
                        <p className="text-[11px] text-slate-500 dark:text-slate-300">{editTroubleshootQuestion}</p>
                        <div className="flex flex-col gap-1.5 mt-1">
                          {editTroubleshootOptions.map(option => (
                            <button key={option} onClick={() => { setEditResolvedOption(option); setEditTitle(editTitle.trim() ? editTitle : 'Lunch'); setEditDetails(`Resolved location: ${option}`); triggerToast(`Resolved location: ${option}`); }} className={`w-full py-2 rounded-lg text-xs font-bold transition border text-left px-3 ${editResolvedOption === option ? 'bg-blue-600 text-white border-blue-600 shadow-md' : (isDark ? 'bg-slate-950 border-slate-800 text-slate-200 hover:bg-slate-800' : 'bg-white border-slate-200 text-slate-800 hover:bg-slate-50')}`}>{option}</button>
                          ))}
                          <div className="flex gap-1.5 mt-1 items-center">
                            <input type="text" placeholder="Other (please type)" value={customOverrideText} onChange={(e) => setCustomOverrideText(e.target.value)} className={`flex-1 border rounded-lg p-2 text-xs outline-none ${isDark ? 'bg-slate-950 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-900'}`} />
                            <button onClick={() => { if (!customOverrideText.trim()) return; setEditResolvedOption(customOverrideText); setEditTitle(editTitle.trim() ? editTitle : 'Lunch'); setEditDetails(`Resolved override: ${customOverrideText}`); }} className="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-3 py-2 rounded-lg shadow-sm">Apply</button>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="border-t border-slate-200 dark:border-slate-800 pt-4 flex gap-2 justify-between mt-6">
                  {rightPanelMode === 'view' && selectedEvent && <button onClick={() => handleDeleteEvent(selectedEvent.id)} className="bg-rose-900/10 dark:bg-rose-900/30 hover:bg-rose-600 text-rose-600 hover:text-white text-xs font-bold px-4 py-2.5 rounded-xl transition flex items-center gap-1.5">Delete Event</button>}
                  <div className="flex gap-2 ml-auto">
                    <button onClick={() => setIsRightPanelOpen(false)} className={`text-xs font-bold px-4 py-2.5 rounded-xl transition border ${isDark ? 'bg-slate-800 border-slate-700 text-slate-300 hover:bg-slate-700' : 'bg-slate-100 border-slate-200 text-slate-700 hover:bg-slate-200'}`}>Cancel</button>
                    {(rightPanelMode === 'create' || rightPanelMode === 'edit') && (
                      <button onClick={() => {
                        if (!editTitle.trim() && !editDescription.trim()) { triggerToast("Please provide event details first!"); return; }
                        const finalTitle = editTitle.trim() || 'AI Scheduled Event';
                        const newEv = { id: selectedEvent ? selectedEvent.id : 'e_' + Date.now(), title: finalTitle, description: editDescription, date: editDate || selectedDayString, time: editTime, duration: editDuration, label: editLabel, importance: editImportance, details: editDetails, syncPlatform: editSync, needsTroubleshoot: editNeedsTroubleshoot, troubleshootQuestion: editTroubleshootQuestion, troubleshootOptions: editTroubleshootOptions, resolvedOption: editResolvedOption };
                        if (rightPanelMode === 'create') setEvents([...events, newEv]); else setEvents(events.map(ev => ev.id === selectedEvent.id ? newEv : ev));
                        setIsRightPanelOpen(false);
                      }} className="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-5 py-2.5 rounded-xl transition shadow-md shadow-blue-500/10">{rightPanelMode === 'create' ? 'Create Event' : 'Save Changes'}</button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
