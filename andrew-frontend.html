<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXTCalendar Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
        <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: {
              950: '#090d16',
              900: '#0f172a',
              850: '#1e293b',
              800: '#334155'
            }
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --nc-page-bg: #f8fafc;
      --nc-page-bg-alt: #ffffff;
      --nc-surface: #ffffff;
      --nc-surface-2: #f1f5f9;
      --nc-surface-3: #e2e8f0;
      --nc-surface-4: #cbd5e1;
      --nc-text: #0f172a;
      --nc-text-strong: #020617;
      --nc-text-muted: #64748b;
      --nc-text-soft: #94a3b8;
      --nc-border: #e2e8f0;
      --nc-border-strong: #cbd5e1;
      --nc-accent: #2563eb;
      --nc-accent-hover: #3b82f6;
      --nc-accent-soft: rgba(37, 99, 235, 0.12);
      --nc-backdrop: rgba(15, 23, 42, 0.45);
      --nc-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      --nc-shadow-strong: 0 24px 70px rgba(15, 23, 42, 0.14);
    }

    html.dark {
      --nc-page-bg: #090d16;
      --nc-page-bg-alt: #0f172a;
      --nc-surface: #0f172a;
      --nc-surface-2: #111827;
      --nc-surface-3: #1e293b;
      --nc-surface-4: #334155;
      --nc-text: #e2e8f0;
      --nc-text-strong: #ffffff;
      --nc-text-muted: #94a3b8;
      --nc-text-soft: #64748b;
      --nc-border: #1e293b;
      --nc-border-strong: #334155;
      --nc-accent: #3b82f6;
      --nc-accent-hover: #60a5fa;
      --nc-accent-soft: rgba(59, 130, 246, 0.16);
      --nc-backdrop: rgba(2, 6, 23, 0.62);
      --nc-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --nc-shadow-strong: 0 24px 70px rgba(0, 0, 0, 0.5);
    }

    html, body {
      background: var(--nc-page-bg);
      color: var(--nc-text);
      min-height: 100%;
      transition: background-color 220ms ease, color 220ms ease;
    }

    body {
      color-scheme: light dark;
    }

    #root {
      min-height: 100vh;
      background: var(--nc-page-bg);
      color: var(--nc-text);
    }

    #nextcalendar-shell {
      background: var(--nc-page-bg);
      color: var(--nc-text);
      min-height: 100vh;
      isolation: isolate;
    }

    #nextcalendar-shell, #nextcalendar-shell * {
      box-sizing: border-box;
    }

    #nextcalendar-shell .text-slate-900,
    #nextcalendar-shell .text-slate-800,
    #nextcalendar-shell .text-slate-700,
    #nextcalendar-shell .text-slate-600,
    #nextcalendar-shell .text-slate-500,
    #nextcalendar-shell .text-slate-400,
    #nextcalendar-shell .text-slate-300,
    #nextcalendar-shell .text-slate-200,
    #nextcalendar-shell .text-slate-100,
    #nextcalendar-shell .text-white,
    #nextcalendar-shell [class*="text-slate-"] {
      transition: color 220ms ease, border-color 220ms ease, background-color 220ms ease, box-shadow 220ms ease;
    }

    #nextcalendar-shell .text-slate-900 { color: var(--nc-text-strong) !important; }
    #nextcalendar-shell .text-slate-800,
    #nextcalendar-shell .text-slate-700 { color: var(--nc-text) !important; }
    #nextcalendar-shell .text-slate-600,
    #nextcalendar-shell .text-slate-500,
    #nextcalendar-shell .text-slate-400 { color: var(--nc-text-muted) !important; }
    #nextcalendar-shell .text-slate-300,
    #nextcalendar-shell .text-slate-200,
    #nextcalendar-shell .text-slate-100,
    #nextcalendar-shell .text-white { color: var(--nc-text-strong) !important; }

    #nextcalendar-shell .bg-white,
    #nextcalendar-shell .bg-slate-50,
    #nextcalendar-shell .bg-slate-100,
    #nextcalendar-shell .bg-slate-900,
    #nextcalendar-shell .bg-slate-950 { background-color: var(--nc-surface) !important; }

    #nextcalendar-shell .bg-slate-50 { background-color: var(--nc-surface-2) !important; }
    #nextcalendar-shell .bg-slate-100 { background-color: var(--nc-surface-2) !important; }
    #nextcalendar-shell .bg-slate-900 { background-color: var(--nc-surface) !important; }
    #nextcalendar-shell .bg-slate-950 { background-color: var(--nc-page-bg-alt) !important; }

    #nextcalendar-shell .border,
    #nextcalendar-shell .border-r,
    #nextcalendar-shell .border-l,
    #nextcalendar-shell .border-t,
    #nextcalendar-shell .border-b,
    #nextcalendar-shell .border-x,
    #nextcalendar-shell .border-y {
      border-color: var(--nc-border) !important;
    }

    #nextcalendar-shell .border-slate-200,
    #nextcalendar-shell .border-slate-300,
    #nextcalendar-shell .border-slate-800,
    #nextcalendar-shell .border-slate-850,
    #nextcalendar-shell .border-slate-950 {
      border-color: var(--nc-border) !important;
    }

    #nextcalendar-shell header,
    #nextcalendar-shell aside,
    #nextcalendar-shell section,
    #nextcalendar-shell .panel,
    #nextcalendar-shell .card {
      color: var(--nc-text);
    }

    #nextcalendar-shell aside,
    #app-header,
    #calendar-month-view,
    #calendar-day-view,
    #calendar-week-view,
    #calendar-year-view,
    #feedback-inner,
    #org-directory-panel,
    #org-parental-panel,
    #labels-modal-card,
    #settings-modal-card,
    #event-panel-card,
    #troubleshoot-section > div,
    #calendar-section > div,
    #feedback-section > div {
      background: var(--nc-surface);
      border-color: var(--nc-border);
      color: var(--nc-text);
      box-shadow: var(--nc-shadow);
    }

    #sidebar,
    #main-content,
    #calendar-section,
    #troubleshoot-section,
    #org-section,
    #feedback-section {
      background: transparent;
      color: inherit;
    }

    #app-header {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--nc-surface) 82%, transparent) !important;
      box-shadow: inset 0 -1px 0 var(--nc-border);
    }

    #calendar-view-toggle,
    #clock-setting-buttons,
    #labels-modal-card,
    #settings-modal-card,
    #event-panel-card {
      background: var(--nc-surface);
    }

    #calendar-view-toggle button,
    #clock-setting-buttons button,
    #header-actions button,
    #sidebar button,
    #event-panel button,
    #settings-modal button,
    #labels-modal button,
    #feedback-submit-button,
    #org-parental-button,
    #event-analyze-button,
    #create-event-button {
      border-color: var(--nc-border);
      color: var(--nc-text);
    }

    #create-event-button,
    #event-analyze-button,
    #event-save-button,
    #feedback-submit-button,
    #labels-add-button,
    #org-parental-button {
      background: var(--nc-accent);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
    }

    #create-event-button:hover,
    #event-analyze-button:hover,
    #event-save-button:hover,
    #feedback-submit-button:hover,
    #labels-add-button:hover,
    #org-parental-button:hover {
      background: var(--nc-accent-hover);
    }

    #compact-view-button,
    #nav-calendar,
    #nav-troubleshoot,
    #nav-labels,
    #nav-settings,
    #view-day,
    #view-week,
    #view-month,
    #view-year {
      background: transparent;
      color: var(--nc-text-muted);
    }

    #nav-calendar:hover,
    #nav-troubleshoot:hover,
    #nav-labels:hover,
    #nav-settings:hover,
    #view-day:hover,
    #view-week:hover,
    #view-month:hover,
    #view-year:hover,
    #compact-view-button:hover {
      background: var(--nc-accent-soft);
      color: var(--nc-text-strong);
    }

    #calendar-view-toggle button.bg-blue-600,
    #clock-setting-buttons button.bg-blue-600,
    #view-day.bg-blue-600,
    #view-week.bg-blue-600,
    #view-month.bg-blue-600,
    #view-year.bg-blue-600 {
      background: var(--nc-accent) !important;
      color: #fff !important;
    }

    #calendar-month-view > div:first-child,
    #calendar-month-view > div:nth-child(-n+7),
    #week-header,
    #day-hours-column > div,
    #week-hours-column > div {
      background: var(--nc-surface-2);
      color: var(--nc-text-muted);
    }

    #calendar-month-view > div,
    #calendar-day-view,
    #calendar-week-view,
    #calendar-year-view {
      box-shadow: var(--nc-shadow);
    }

    #troubleshoot-empty-state {
      background: var(--nc-accent-soft);
      border-color: color-mix(in srgb, var(--nc-accent) 25%, transparent) !important;
    }

    #event-panel,
    #settings-modal,
    #labels-modal {
      background: var(--nc-backdrop);
    }

    #event-panel-card,
    #settings-modal-card,
    #labels-modal-card {
      border: 1px solid var(--nc-border);
      box-shadow: var(--nc-shadow-strong);
    }

    #event-panel input,
    #event-panel textarea,
    #event-panel select,
    #settings-modal select,
    #labels-input,
    #feedback-textarea,
    #feedback-category-select {
      background: var(--nc-surface-2);
      color: var(--nc-text);
      border-color: var(--nc-border);
    }

    #event-panel input::placeholder,
    #event-panel textarea::placeholder,
    #labels-input::placeholder,
    #feedback-textarea::placeholder {
      color: var(--nc-text-soft);
    }

    #event-troubleshoot-box,
    #feedback-history > div,
    #troubleshoot-list > div,
    #org-users-list > div,
    #labels-list > div,
    #calendar-month-view .group > div,
    #calendar-day-view [data-event-id],
    #calendar-week-view [data-event-id],
    #year-mini-months > div {
      background: color-mix(in srgb, var(--nc-surface) 88%, var(--nc-surface-2));
      border-color: var(--nc-border);
      color: var(--nc-text);
    }

    #feedback-history > div,
    #labels-list > div,
    #event-troubleshoot-box {
      box-shadow: var(--nc-shadow);
    }

    #calendar-month-view,
    #calendar-day-view,
    #calendar-week-view,
    #calendar-year-view,
    #feedback-inner,
    #org-directory-panel,
    #org-parental-panel,
    #troubleshoot-list > div,
    #labels-modal-card,
    #settings-modal-card,
    #event-panel-card {
      overflow: hidden;
    }

    ::selection {
      background: rgba(59, 130, 246, 0.28);
      color: #fff;
    }

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--nc-border-strong) 70%, transparent);
      border: 3px solid transparent;
      background-clip: padding-box;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: color-mix(in srgb, var(--nc-accent) 55%, transparent);
      border: 3px solid transparent;
      background-clip: padding-box;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

  <template id="nextcalendar-static-layout">
    <div id="nextcalendar-shell" class="min-h-screen h-screen flex font-sans select-none overflow-hidden relative">
      <aside id="sidebar" class="group w-16 hover:w-60 transition-all duration-300 border-r flex flex-col justify-between p-2 shrink-0 z-40 h-screen fixed md:sticky top-0 left-0">
        <div id="sidebar-main" class="flex flex-col gap-6 overflow-y-auto no-scrollbar">
          <div id="sidebar-brand" class="flex items-center gap-3 px-2 py-2 w-full justify-start h-12">
            <div id="sidebar-brand-icon" class="w-12 h-12 flex items-center justify-center shrink-0"></div>
            <span id="sidebar-brand-text" class="font-black text-sm tracking-widest opacity-0 group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap overflow-hidden">NEXTCALENDAR</span>
          </div>

          <nav id="sidebar-nav" class="flex flex-col gap-2">
            <button id="nav-calendar" class="w-full h-12 flex items-center justify-start rounded-xl transition-all overflow-hidden">
              <div id="nav-calendar-icon" class="w-12 h-12 flex items-center justify-center shrink-0"></div>
              <span id="nav-calendar-text" class="text-xs tracking-wider opacity-0 group-hover:opacity-100 transition-opacity duration-200 ml-1">Grid</span>
            </button>
            <button id="nav-troubleshoot" class="w-full h-12 flex items-center justify-start rounded-xl transition-all overflow-hidden">
              <div id="nav-troubleshoot-icon" class="w-12 h-12 flex items-center justify-center shrink-0"></div>
              <span id="nav-troubleshoot-text" class="text-xs tracking-wider opacity-0 group-hover:opacity-100 transition-opacity duration-200 ml-1">Alerts</span>
            </button>
            <button id="nav-labels" class="w-full h-12 flex items-center justify-start rounded-xl transition-all overflow-hidden">
              <div id="nav-labels-icon" class="w-12 h-12 flex items-center justify-center shrink-0"></div>
              <span id="nav-labels-text" class="text-xs tracking-wider opacity-0 group-hover:opacity-100 transition-opacity duration-200 ml-1">Labels</span>
            </button>
          </nav>
        </div>

        <div id="sidebar-footer" class="pt-2 border-t">
          <button id="nav-settings" class="w-full h-12 flex items-center justify-start rounded-xl transition-all overflow-hidden">
            <div id="nav-settings-icon" class="w-12 h-12 flex items-center justify-center shrink-0"></div>
            <span id="nav-settings-text" class="text-xs tracking-wider opacity-0 group-hover:opacity-100 ml-1">Settings</span>
          </button>
        </div>
      </aside>

      <main id="main-content" class="flex-1 flex flex-col overflow-hidden h-full ml-16 md:ml-0">
        <header id="app-header" class="border-b p-4 md:p-6 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
          <div id="header-brand">
            <h1 id="header-title" class="text-2xl font-black tracking-tight">NEXTCalendar</h1>
            <p id="header-subtitle" class="text-xs font-semibold uppercase tracking-wider">Minimalist AI Scheduler</p>
          </div>
          <div id="header-actions" class="flex items-center gap-2 shrink-0">
            <button id="create-event-button" class="text-xs font-bold px-4 py-2.5 rounded-xl transition flex items-center gap-1.5">Create Event</button>
            <button id="compact-view-button" class="border text-xs px-3 py-2.5 rounded-xl transition">Compact view</button>
          </div>
        </header>

        <div id="toast-host"></div>

        <section id="calendar-section" class="flex-1 p-4 md:p-6 flex flex-col gap-4 overflow-hidden h-full">
          <div id="calendar-topbar" class="flex justify-between items-center flex-wrap gap-4 shrink-0">
            <h2 id="calendar-heading" class="text-xl font-bold tracking-tight">Month / Day / Week / Year</h2>
            <div id="calendar-view-toggle" class="p-1 border rounded-xl shadow-sm flex gap-1 items-center">
              <button id="view-day" class="text-[11px] font-black px-3 py-1 rounded-lg transition-all capitalize">day</button>
              <button id="view-week" class="text-[11px] font-black px-3 py-1 rounded-lg transition-all capitalize">week</button>
              <button id="view-month" class="text-[11px] font-black px-3 py-1 rounded-lg transition-all capitalize">month</button>
              <button id="view-year" class="text-[11px] font-black px-3 py-1 rounded-lg transition-all capitalize">year</button>
            </div>
          </div>

          <div id="calendar-month-view" class="grid grid-cols-7 gap-1.5 border rounded-2xl overflow-hidden shadow-sm flex-1">
            <div id="month-weekday-sun" class="p-3 text-center text-xs font-bold border-r border-b">Sun</div>
            <div id="month-weekday-mon" class="p-3 text-center text-xs font-bold border-r border-b">Mon</div>
            <div id="month-weekday-tue" class="p-3 text-center text-xs font-bold border-r border-b">Tue</div>
            <div id="month-weekday-wed" class="p-3 text-center text-xs font-bold border-r border-b">Wed</div>
            <div id="month-weekday-thu" class="p-3 text-center text-xs font-bold border-r border-b">Thu</div>
            <div id="month-weekday-fri" class="p-3 text-center text-xs font-bold border-r border-b">Fri</div>
            <div id="month-weekday-sat" class="p-3 text-center text-xs font-bold border-r border-b">Sat</div>
            <div id="month-days-grid" class="contents"></div>
          </div>

          <div id="calendar-day-view" class="flex-1 flex flex-col border rounded-3xl p-0.5 shadow-sm overflow-hidden h-full">
            <div id="day-timeline-scroll" class="flex-1 overflow-y-auto pr-2 scroll-smooth rounded-2xl relative">
              <div id="day-timeline-layout" class="flex relative w-full h-[1440px]">
                <div id="day-hours-column" class="w-16 flex flex-col select-none border-r">
                  <div id="day-hour-00" class="h-[60px] text-[10px] font-black pr-2 pt-1.5 text-right border-b">12:00 AM</div>
                </div>
                <div id="day-timeline-grid" class="flex-1 h-[1440px] relative cursor-pointer"></div>
              </div>
            </div>
          </div>

          <div id="calendar-week-view" class="flex-1 flex flex-col border rounded-3xl p-0.5 shadow-sm overflow-hidden h-full">
            <div id="week-header" class="flex shrink-0 border-b">
              <div id="week-header-hours-spacer" class="w-16 shrink-0 border-r"></div>
              <div id="week-header-days" class="flex-1 grid grid-cols-7 text-center py-2"></div>
            </div>
            <div id="week-timeline-scroll" class="flex-1 overflow-y-auto pr-2 scroll-smooth rounded-b-2xl relative">
              <div id="week-timeline-layout" class="flex relative w-full h-[1440px]">
                <div id="week-hours-column" class="w-16 flex flex-col select-none border-r">
                  <div id="week-hour-00" class="h-[60px] text-[10px] font-black pr-2 pt-1.5 text-right border-b">12:00 AM</div>
                </div>
                <div id="week-columns" class="flex-1 h-[1440px] grid grid-cols-7 relative"></div>
              </div>
            </div>
          </div>

          <div id="calendar-year-view" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 flex-1 overflow-y-auto pr-1">
            <div id="year-mini-months" class="contents"></div>
          </div>
        </section>

        <section id="troubleshoot-section" class="flex-1 p-6 flex flex-col gap-4 overflow-y-auto">
          <div id="troubleshoot-inner" class="max-w-4xl mx-auto w-full">
            <h2 id="troubleshoot-title" class="text-2xl font-bold mb-1">NEXTCalendar Agent Resolution Hub</h2>
            <p id="troubleshoot-subtitle" class="text-xs mb-6">Clarify raw synthesized text snippets which did not meet parsing thresholds.</p>
            <div id="troubleshoot-empty-state" class="bg-blue-600/10 border border-blue-500/20 p-8 rounded-2xl text-center" style="display:none">
              <span id="troubleshoot-empty-icon" class="text-3xl">✨</span>
              <h3 id="troubleshoot-empty-heading" class="text-sm font-bold mt-2">All Confusions Resolved</h3>
              <p id="troubleshoot-empty-copy" class="text-xs mt-1">Excellent! Your input calendar schedules are perfectly structured.</p>
            </div>
            <div id="troubleshoot-list" class="grid gap-4"></div>
          </div>
        </section>

        <section id="org-section" class="flex-1 p-6 overflow-y-auto">
          <div id="org-inner" class="max-w-4xl mx-auto">
            <h2 id="org-title" class="text-2xl font-bold mb-1">Interorganizational Communication</h2>
            <p id="org-subtitle" class="text-xs mb-6">Coordinate schedule availability securely with workspace directories and parental safeguards.</p>
            <div id="org-grid" class="grid md:grid-cols-3 gap-6">
              <div id="org-directory-panel" class="md:col-span-2 border p-5 rounded-2xl flex flex-col gap-4 shadow-sm">
                <h3 id="org-directory-title" class="text-sm font-bold">Shared Directory Spot Locator</h3>
                <div id="org-users-list" class="space-y-3"></div>
              </div>

              <div id="org-parental-panel" class="border p-5 rounded-2xl flex flex-col justify-between shadow-sm">
                <div id="org-parental-copy">
                  <h3 id="org-parental-title" class="text-sm font-bold mb-2">Parental Controls Dashboard</h3>
                  <p id="org-parental-subtitle" class="text-xs mb-4">Protect child agendas, restrict external workspace discoverability, and audit auto-created tasks.</p>
                  <div id="org-parental-toggles" class="space-y-3">
                    <div id="org-toggle-visibility" class="flex justify-between items-center p-2.5 rounded-xl border">
                      <span id="org-toggle-visibility-label" class="text-xs">Limit calendar visibility</span>
                      <input id="org-toggle-visibility-input" type="checkbox" />
                    </div>
                    <div id="org-toggle-invites" class="flex justify-between items-center p-2.5 rounded-xl border">
                      <span id="org-toggle-invites-label" class="text-xs">Verify external invites</span>
                      <input id="org-toggle-invites-input" type="checkbox" />
                    </div>
                  </div>
                </div>
                <button id="org-parental-button" class="text-xs font-bold py-2.5 rounded-xl mt-4 transition">Enable Safeguards</button>
              </div>
            </div>
          </div>
        </section>

        <section id="feedback-section" class="flex-1 p-6 overflow-y-auto">
          <div id="feedback-inner" class="max-w-xl mx-auto border p-6 rounded-2xl shadow-xl">
            <h2 id="feedback-title" class="text-xl font-bold mb-1">Recommendations & Feedback</h2>
            <p id="feedback-subtitle" class="text-xs mb-6">Submit feature suggestions or report issues directly into our product workspace.</p>
            <div id="feedback-form" class="flex flex-col gap-4">
              <div id="feedback-category-group">
                <label id="feedback-category-label" class="text-xs block mb-1">Feedback Category:</label>
                <select id="feedback-category-select" class="w-full border rounded-xl p-2.5 text-xs"></select>
              </div>
              <div id="feedback-text-group">
                <label id="feedback-text-label" class="text-xs block mb-1">Description:</label>
                <textarea id="feedback-textarea" rows="4" class="w-full border rounded-xl p-3 text-xs" placeholder="Describe your suggestion or layout issue..."></textarea>
              </div>
              <button id="feedback-submit-button" class="text-xs font-bold py-2.5 rounded-xl transition shadow-md">Submit Form</button>
            </div>
            <div id="feedback-history" class="mt-6"></div>
          </div>
        </section>
      </main>

    function handleDayTimelineGridClick(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const clickY = e.clientY - rect.top;
      let hours = Math.floor(clickY / 60);
      let mins = Math.round((clickY % 60) / 5) * 5;
      if (mins === 60) { hours += 1; mins = 0; }
      if (hours >= 24) hours = 23;
      const ampm = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 === 0 ? 12 : hours % 12;
      const timeStr = `${String(displayHours).padStart(2, '0')}:${String(mins).padStart(2, '0')} ${ampm}`;
      state.edit = { ...state.edit, date: state.selectedDayString, time: timeStr, duration: 60, title: '', description: '', label: 'event', details: '', sync: 'None', importance: 'medium', needsTroubleshoot: false, resolvedOption: null };
      state.selectedEventId = null;
      state.isEventPanelOpen = true;
      renderAll();
    }

        date: safeDateString(new Date()),

        duration: 60,

        needsTroubleshoot: false,
        troubleshootQuestion: '',

        resolvedOption: date || null
      };

      state.troubleQueue = state.troubleQueue.filter(q => q.id !== item.id);
      triggerToast('Trouble resolved and event added.');
      renderAll();

    function simulateLocalAI(text) {
      const lowercase = text.toLowerCase();
      let label = 'event';
      if (lowercase.includes('due') || lowercase.includes('deadline') || lowercase.includes('submit')) label = 'due date';
      else if (lowercase.includes('every') || lowercase.includes('weekly') || lowercase.includes('recurring')) label = 'recurring event';
      let time = '12:00 PM';
      const timeMatch = text.match(/(\d+):?(\d+)?\s*(am|pm)/i);
      if (timeMatch) time = timeMatch[0].toUpperCase();
      let targetDate = safeDateString(new Date());
      if (lowercase.includes('tomorrow')) targetDate = safeDateString(new Date(Date.now() + 86400000));
      let importance = 'medium';
      if (lowercase.includes('important') || lowercase.includes('urgent') || lowercase.includes('asap')) importance = 'high';
      const isTroubleshootDemo = lowercase.includes("cafe") && lowercase.includes("mama");
      return {
        title: isTroubleshootDemo ? 'Lunch' : (text.split('at')[0].trim().substring(0, 40) || 'Synthesized Task'),
        date: targetDate,
        time,
        duration: 60,
        label,
        importance,
        needsTroubleshoot: isTroubleshootDemo,
        troubleshootQuestion: isTroubleshootDemo ? "Did you mean at the Cafe or at TGI Fridays?" : "",
        troubleshootOptions: isTroubleshootDemo ? ["Cafe", "TGI Fridays"] : []
      };
    }

    async function analyzeEvent() {
      const textContext = (eventDescriptionInput.value || '').trim();
      if (!textContext) {
        triggerToast('Please write details into the Notecard');
        return;
      }
      const localParsed = simulateLocalAI(textContext);
      try {
        const response = await fetch(FEATHERLESS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${FEATHERLESS_API_KEY}` },
          body: JSON.stringify({
            model: FEATHERLESS_MODEL,
            messages: [
              { role: "system", content: 'You are a professional calendar scheduling assistant. Parse the calendar entry. Respond ONLY in JSON matching this exact layout: {"title":"string","time":"HH:MM AM/PM","duration":60,"label":"event","importance":"medium"}.' },
              { role: "user", content: `Analyze this note text: "${textContext}"` }
            ]
          })
        });
        if (!response.ok) throw new Error('API Limit or Request Error');
        const data = await response.json();
        const rawResult = data.choices[0].message.content || '';
        const jsonText = rawResult.includes('{') ? rawResult.slice(rawResult.indexOf('{'), rawResult.lastIndexOf('}') + 1) : '{}';
        const parsed = JSON.parse(jsonText);
        state.edit.title = parsed.title || localParsed.title;
        state.edit.time = parsed.time || localParsed.time;
        state.edit.duration = parsed.duration || 60;
        state.edit.label = parsed.label || 'event';
        state.edit.importance = parsed.importance || 'medium';
        state.edit.details = 'Analyzed in real-time by NEXTCalendar Llama AI.';
        state.edit.needsTroubleshoot = textContext.toLowerCase().includes('cafe') && textContext.toLowerCase().includes('mama');
        state.edit.troubleshootQuestion = state.edit.needsTroubleshoot ? 'Did you mean at the Cafe or at TGI Fridays?' : '';
        state.edit.troubleshootOptions = state.edit.needsTroubleshoot ? ['Cafe', 'TGI Fridays'] : [];
        triggerToast('AI analysis complete!');
      } catch (err) {
        state.edit.title = localParsed.title;
        state.edit.time = localParsed.time;
        state.edit.duration = localParsed.duration;
        state.edit.label = localParsed.label;
        state.edit.importance = localParsed.importance;
        state.edit.details = 'Parsed locally via fallback engine.';
        state.edit.needsTroubleshoot = localParsed.needsTroubleshoot;
        state.edit.troubleshootQuestion = localParsed.troubleshootQuestion;
        state.edit.troubleshootOptions = localParsed.troubleshootOptions;
        triggerToast('AI offline. Processed via local parser!');
      }
      renderAll();
    }

        const [id, label] = btn.getAttribute('data-resolve').split('|');
        const item = state.troubleQueue.find(x => x.id === id);
        if (item) resolveTrouble(item, label, item.possibleDates[0]);
      }));
      troubleshootList.querySelectorAll('[data-discard]').forEach(btn => btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-discard');
        state.troubleQueue = state.troubleQueue.filter(q => q.id !== id);
        renderAll();
      }));
    }

    function renderOrg() {
      if (!orgUsersList) return;
      const orgUsers = [
        { id: 1, name: 'Alex Johnson', role: 'Product Manager', availableSlots: ['09:00 AM - 10:00 AM', '02:00 PM - 03:00 PM'] },
        { id: 2, name: 'Maria Chen', role: 'Designer', availableSlots: ['11:00 AM - 12:00 PM', '03:00 PM - 04:00 PM'] },
        { id: 3, name: 'Sam Patel', role: 'Engineer', availableSlots: ['10:30 AM - 11:30 AM', '04:00 PM - 05:00 PM'] }
      ];
      orgUsersList.innerHTML = orgUsers.map(user => `
        <div class="bg-slate-50 dark:bg-slate-950/60 p-4 rounded-xl border border-slate-200 dark:border-slate-800 flex justify-between items-center">
          <div>
            <h4 class="text-xs font-bold text-slate-800 dark:text-white">${escapeHtml(user.name)}</h4>
            <span class="text-[10px] text-blue-600 dark:text-blue-300 font-semibold">${escapeHtml(user.role)}</span>
          </div>
          <div class="text-right">
            <span class="text-[10px] text-emerald-500 font-bold block mb-1">Available Spots:</span>
            <div class="flex gap-1 flex-wrap justify-end">
              ${user.availableSlots.map(slot => `<button class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-[10px] px-2 py-1 rounded-lg">${escapeHtml(slot)}</button>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
      if (orgToggleVisibilityInput) orgToggleVisibilityInput.checked = state.parentalControlsEnabled;
      if (orgToggleInvitesInput) orgToggleInvitesInput.checked = state.parentalControlsEnabled;
      if (orgParentalButton) orgParentalButton.textContent = state.parentalControlsEnabled ? 'Disable Safeguards' : 'Enable Safeguards';
    }

    function renderLabelsModal() {
      if (!labelsList) return;
      labelsList.innerHTML = state.labelsList.map(l => `
        <div class="flex items-center gap-2 border rounded-full px-3 py-2 text-xs">
          <span>${escapeHtml(l.name)}</span>
          <button data-delete-label="${escapeHtml(l.name)}" class="font-bold">×</button>
        </div>
      `).join('');
      labelsList.querySelectorAll('[data-delete-label]').forEach(btn => btn.addEventListener('click', () => {
        const name = btn.getAttribute('data-delete-label');
        state.labelsList = state.labelsList.filter(l => l.name !== name);
        renderAll();
      }));
      if (labelsInput) labelsInput.value = state.newLabelName;
    }

    function renderFeedback() {
      if (feedbackCategorySelect) {
        const categories = ['Recommendation', 'Bug report', 'Question', 'Other'];
        feedbackCategorySelect.innerHTML = categories.map(cat => `<option ${cat === state.feedbackCategory ? 'selected' : ''}>${cat}</option>`).join('');
      }
      if (feedbackTextarea) feedbackTextarea.value = state.feedbackText;
      if (feedbackHistory) {
        feedbackHistory.innerHTML = state.feedbacks.map(f => `<div class="mt-2 text-xs border rounded-xl p-3">${escapeHtml(f.category)}: ${escapeHtml(f.text)}</div>`).join('');
      }
    }

    function renderEventPanel() {
      if (eventTitleInput) eventTitleInput.value = state.edit.title;
      if (eventDescriptionInput) eventDescriptionInput.value = state.edit.description;
      if (eventInterpretationHeading) eventInterpretationHeading.textContent = state.edit.title || 'Awaiting Analysis...';
      if (eventTimeValue) eventTimeValue.textContent = state.edit.time || '12:00 PM';
      if (eventDurationValue) eventDurationValue.textContent = `${state.edit.duration || 60} Mins`;
      if (eventDeleteButton) eventDeleteButton.style.display = state.selectedEventId ? 'inline-flex' : 'none';
      if (eventTroubleshootBox) {
        eventTroubleshootBox.style.display = state.edit.needsTroubleshoot ? 'flex' : 'none';
        if (state.edit.needsTroubleshoot) {
          eventTroubleshootQuestion.textContent = state.edit.troubleshootQuestion || '';
          eventTroubleshootOptions.innerHTML = (state.edit.troubleshootOptions || []).map(opt => `<button class="text-xs border rounded-lg px-3 py-2">${escapeHtml(opt)}</button>`).join('');
        }
      }
    }

    function openDay(dayStr) {
      state.selectedDayString = dayStr;
      state.currentView = 'day';
      state.activeTab = 'calendar';
      renderAll();
    }

    function openEvent(ev) {
      state.selectedEventId = ev.id;
      state.edit = {
        title: ev.title || '',
        description: ev.description || '',
        date: ev.date || state.selectedDayString,
        time: ev.time || '12:00 PM',
        duration: ev.duration || 60,
        label: ev.label || 'event',
        sync: ev.syncPlatform || 'None',
        importance: ev.importance || 'medium',
        details: ev.details || '',
        needsTroubleshoot: !!ev.needsTroubleshoot,
        troubleshootQuestion: ev.troubleshootQuestion || '',
        troubleshootOptions: ev.troubleshootOptions || [],
        resolvedOption: ev.resolvedOption || null
      };
      state.isEventPanelOpen = true;
      renderAll();
    }

    function openCreateEvent() {
      state.selectedEventId = null;
      state.edit = {
        title: '',
        description: '',
        date: state.selectedDayString,
        time: '12:00 PM',
        duration: 60,
        label: 'event',
        sync: 'None',
        importance: 'medium',
        details: '',
        needsTroubleshoot: false,
        troubleshootQuestion: '',
        troubleshootOptions: [],
        resolvedOption: null
      };
      state.isEventPanelOpen = true;
      renderAll();
    }

    function handleDayTimelineGridClick(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const clickY = e.clientY - rect.top;
      let hours = Math.floor(clickY / 60);
      let mins = Math.round((clickY % 60) / 5) * 5;
      if (mins === 60) { hours += 1; mins = 0; }
      if (hours >= 24) hours = 23;
      const ampm = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 === 0 ? 12 : hours % 12;
      const timeStr = `${String(displayHours).padStart(2, '0')}:${String(mins).padStart(2, '0')} ${ampm}`;
      state.edit = { ...state.edit, date: state.selectedDayString, time: timeStr, duration: 60, title: '', description: '', label: 'event', details: '', sync: 'None', importance: 'medium', needsTroubleshoot: false, resolvedOption: null };
      state.selectedEventId = null;
      state.isEventPanelOpen = true;
      renderAll();
    }

    function resolveTrouble(item, label, date) {
      const newEvent = {
        id: 'e_' + Date.now(),
        title: item.rawText.split(' ')[0] || 'Resolved Item',
        description: item.rawText,
        date: safeDateString(new Date()),
        time: '12:00 PM',
        duration: 60,
        label,
        importance: 'medium',
        details: date ? `Resolved: ${date}` : '',
        syncPlatform: 'None',
        needsTroubleshoot: false,
        troubleshootQuestion: '',
        troubleshootOptions: [],
        resolvedOption: date || null
      };
      state.events = [...state.events, newEvent];
      state.troubleQueue = state.troubleQueue.filter(q => q.id !== item.id);
      triggerToast('Trouble resolved and event added.');
      renderAll();
    }

    function simulateLocalAI(text) {
      const lowercase = text.toLowerCase();
      let label = 'event';
      if (lowercase.includes('due') || lowercase.includes('deadline') || lowercase.includes('submit')) label = 'due date';
      else if (lowercase.includes('every') || lowercase.includes('weekly') || lowercase.includes('recurring')) label = 'recurring event';
      let time = '12:00 PM';
      const timeMatch = text.match(/(\d+):?(\d+)?\s*(am|pm)/i);
      if (timeMatch) time = timeMatch[0].toUpperCase();
      let targetDate = safeDateString(new Date());
      if (lowercase.includes('tomorrow')) targetDate = safeDateString(new Date(Date.now() + 86400000));
      let importance = 'medium';
      if (lowercase.includes('important') || lowercase.includes('urgent') || lowercase.includes('asap')) importance = 'high';
      const isTroubleshootDemo = lowercase.includes("cafe") && lowercase.includes("mama");
      return {
        title: isTroubleshootDemo ? 'Lunch' : (text.split('at')[0].trim().substring(0, 40) || 'Synthesized Task'),
        date: targetDate,
        time,
        duration: 60,
        label,
        importance,
        needsTroubleshoot: isTroubleshootDemo,
        troubleshootQuestion: isTroubleshootDemo ? "Did you mean at the Cafe or at TGI Fridays?" : "",
        troubleshootOptions: isTroubleshootDemo ? ["Cafe", "TGI Fridays"] : []
      };
    }

    async function analyzeEvent() {
      const textContext = (eventDescriptionInput.value || '').trim();
      if (!textContext) {
        triggerToast('Please write details into the Notecard');
        return;
      }
      const localParsed = simulateLocalAI(textContext);
      try {
        const response = await fetch(FEATHERLESS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${FEATHERLESS_API_KEY}` },
          body: JSON.stringify({
            model: FEATHERLESS_MODEL,
            messages: [
              { role: "system", content: 'You are a professional calendar scheduling assistant. Parse the calendar entry. Respond ONLY in JSON matching this exact layout: {"title":"string","time":"HH:MM AM/PM","duration":60,"label":"event","importance":"medium"}.' },
              { role: "user", content: `Analyze this note text: "${textContext}"` }
            ]
          })
        });
        if (!response.ok) throw new Error('API Limit or Request Error');
        const data = await response.json();
        const rawResult = data.choicesz[0].message.content || '';
        const jsonText = rawResult.includes('{') ? rawResult.slice(rawResult.indexOf('{'), rawResult.lastIndexOf('}') + 1) : '{}';
        const parsed = JSON.parse(jsonText);
        state.edit.title = parsed.title || localParsed.title;
        state.edit.time = parsed.time || localParsed.time;
        state.edit.duration = parsed.duration || 60;
        state.edit.label = parsed.label || 'event';
        state.edit.importance = parsed.importance || 'medium';
        state.edit.details = 'Analyzed in real-time by NEXTCalendar Llama AI.';
        state.edit.needsTroubleshoot = textContext.toLowerCase().includes('cafe') && textContext.toLowerCase().includes('mama');
        state.edit.troubleshootQuestion = state.edit.needsTroubleshoot ? 'Did you mean at the Cafe or at TGI Fridays?' : '';
        state.edit.troubleshootOptions = state.edit.needsTroubleshoot ? ['Cafe', 'TGI Fridays'] : [];
        triggerToast('AI analysis complete!');
      } catch (err) {
        state.edit.title = localParsed.title;
        state.edit.time = localParsed.time;
        state.edit.duration = localParsed.duration;
        state.edit.label = localParsed.label;
        state.edit.importance = localParsed.importance;
        state.edit.details = 'Parsed locally via fallback engine.';
        state.edit.needsTroubleshoot = localParsed.needsTroubleshoot;
        state.edit.troubleshootQuestion = localParsed.troubleshootQuestion;
        state.edit.troubleshootOptions = localParsed.troubleshootOptions;
        triggerToast('AI offline. Processed via local parser!');
      }
      renderAll();
    }

    function saveEvent() {
      const title = (eventTitleInput.value || state.edit.title || '').trim() || 'Untitled Event';
      const description = (eventDescriptionInput.value || state.edit.description || '').trim();
      const eventData = {
        id: state.selectedEventId || `e_${Date.now()}`,
        title,
        description,
        date: state.edit.date || state.selectedDayString,
        time: state.edit.time || '12:00 PM',
        duration: state.edit.duration || 60,
        label: state.edit.label || 'event',
        importance: state.edit.importance || 'medium',
        details: state.edit.details || '',
        syncPlatform: state.edit.sync || 'None',
        needsTroubleshoot: state.edit.needsTroubleshoot || false,
        troubleshootQuestion: state.edit.troubleshootQuestion || '',
        troubleshootOptions: state.edit.troubleshootOptions || [],
        resolvedOption: state.edit.resolvedOption || null
      };
      if (state.selectedEventId) {
        state.events = state.events.map(ev => ev.id === state.selectedEventId ? eventData : ev);
      } else {
        state.events = [...state.events, eventData];
      }
      state.isEventPanelOpen = false;
      triggerToast(state.selectedEventId ? 'Event updated.' : 'Event created.');
      renderAll();
    }

    function deleteEvent() {
      if (!state.selectedEventId) return;
      state.events = state.events.filter(ev => ev.id !== state.selectedEventId);
      state.isEventPanelOpen = false;
      triggerToast('Event deleted.');
      renderAll();
    }

    function renderThemeControls() {
      if (themeSettingSelect) themeSettingSelect.value = state.themeMode;
      if (clock12Button && clock24Button) {
        clock12Button.className = `flex-1 py-2 rounded-xl text-xs font-bold transition border ${state.is24HourClock ? '' : 'bg-blue-600 text-white'}`;
        clock24Button.className = `flex-1 py-2 rounded-xl text-xs font-bold transition border ${state.is24HourClock ? 'bg-blue-600 text-white' : ''}`;
      }
      if (compactViewButton) compactViewButton.textContent = state.isCompact ? 'Comfort view' : 'Compact view';
    }

    function renderCalendarControls() {
      renderCalendarHeader();
      renderVisibility();
      renderThemeControls();
    }

    function renderAll() {
      renderCalendarControls();
      renderMonthView();
      renderDayView();
      renderWeekView();
      renderYearView();
      renderTroubleshoot();
      renderOrg();
      renderLabelsModal();
      renderFeedback();
      renderEventPanel();
      renderToast();
    }

    createEventButton.addEventListener('click', openCreateEvent);
    compactViewButton.addEventListener('click', () => { state.isCompact = !state.isCompact; renderAll(); });
    navCalendar.addEventListener('click', () => { state.activeTab = 'calendar'; state.currentView = 'month'; renderAll(); });
    navTroubleshoot.addEventListener('click', () => { state.activeTab = 'troubleshoot'; renderAll(); });
    navLabels.addEventListener('click', () => { state.isLabelsModalOpen = true; renderAll(); });
    navSettings.addEventListener('click', () => { state.isSettingsModalOpen = true; renderAll(); });

    viewDay.addEventListener('click', () => { state.currentView = 'day'; renderAll(); });
    viewWeek.addEventListener('click', () => { state.currentView = 'week'; renderAll(); });
    viewMonth.addEventListener('click', () => { state.currentView = 'month'; renderAll(); });
    viewYear.addEventListener('click', () => { state.currentView = 'year'; renderAll(); });

    settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) { state.isSettingsModalOpen = false; renderAll(); } });
    labelsModal.addEventListener('click', (e) => { if (e.target === labelsModal) { state.isLabelsModalOpen = false; renderAll(); } });
    eventPanel.addEventListener('click', (e) => { if (e.target === eventPanel) { state.isEventPanelOpen = false; renderAll(); } });

    settingsClose.addEventListener('click', () => { state.isSettingsModalOpen = false; renderAll(); });
    labelsClose.addEventListener('click', () => { state.isLabelsModalOpen = false; renderAll(); });
    eventClose.addEventListener('click', () => { state.isEventPanelOpen = false; renderAll(); });
    eventCancelButton.addEventListener('click', () => { state.isEventPanelOpen = false; renderAll(); });
    eventSaveButton.addEventListener('click', saveEvent);
    eventDeleteButton.addEventListener('click', deleteEvent);
    eventAnalyzeButton.addEventListener('click', analyzeEvent);

    labelsAddButton.addEventListener('click', () => {
      const n = (labelsInput.value || '').trim();
      if (!n) return;
      if (state.labelsList.some(l => l.name.toLowerCase() === n.toLowerCase())) return;
      state.labelsList.push({ name: n, color: 'bg-slate-500/10 text-slate-700 dark:text-slate-300 border-slate-500/20' });
      state.newLabelName = '';
      if (labelsInput) labelsInput.value = '';
      renderAll();
    });

    labelsInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        labelsAddButton.click();
      }
    });

    themeSettingSelect.addEventListener('change', (e) => { setThemeMode(e.target.value); renderAll(); });
    clock12Button.addEventListener('click', () => { state.is24HourClock = false; renderAll(); });
    clock24Button.addEventListener('click', () => { state.is24HourClock = true; renderAll(); });

    feedbackCategorySelect.addEventListener('change', (e) => { state.feedbackCategory = e.target.value; });
    feedbackTextarea.addEventListener('input', (e) => { state.feedbackText = e.target.value; });
    feedbackSubmitButton.addEventListener('click', () => {
      const text = (state.feedbackText || '').trim();
      if (!text) return;
      state.feedbacks.unshift({ category: state.feedbackCategory, text });
      state.feedbackText = '';
      triggerToast('Feedback submitted.');
      renderAll();
    });

    orgParentalButton.addEventListener('click', () => {
      state.parentalControlsEnabled = !state.parentalControlsEnabled;
      triggerToast(state.parentalControlsEnabled ? 'Safeguards enabled.' : 'Safeguards disabled.');
      renderAll();
    });
    orgToggleVisibilityInput.addEventListener('change', () => { state.parentalControlsEnabled = orgToggleVisibilityInput.checked; renderAll(); });
    orgToggleInvitesInput.addEventListener('change', () => { state.parentalControlsEnabled = orgToggleInvitesInput.checked; renderAll(); });

    dayTimelineGrid.addEventListener('click', handleDayTimelineGridClick);

    window.addEventListener('keydown', (e) => {
      if (e.key === '`') triggerToast('Devtools key detected.');
    });

    if (themeSettingSelect) {
      themeSettingSelect.innerHTML = `
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      `;
    }

    setThemeMode(state.themeMode);
    renderAll();
  });
</script>

</body>
</html>
